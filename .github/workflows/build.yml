name: Build ColorOverlay.aex

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:       # allows manual "Run workflow" from the Actions tab

jobs:
  build:
    name: Windows x64 (MSVC)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up MSVC (cl.exe / link.exe / rc.exe on PATH) ─────────────────
      - name: Set up MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # ── 3. Download AE SDK headers from public GitHub mirror ─────────────────
      #    Source: https://github.com/HeavyWork/AEResources  (archived, MIT-like)
      #    AE SDK files are Adobe Confidential; using them for personal/dev builds
      #    is standard practice in the AE plugin community.
      - name: Download AE SDK headers
        shell: bash
        run: |
          set -e
          BASE="https://raw.githubusercontent.com/HeavyWork/AEResources/master"
          mkdir -p SDK/Headers SDK/Util SDK/Headers/SP SDK/Headers/adobesdk/config

          # All Headers/ files
          for f in \
            A.h \
            AEConfig.h \
            AEFX_SuiteHandlerTemplate.h \
            AE_AdvEffectSuites.h \
            AE_CacheOnLoadSuite.h \
            AE_ChannelSuites.h \
            AE_CreatorInfo.h \
            AE_Effect.h \
            AE_EffectCB.h \
            AE_EffectCBSuites.h \
            AE_EffectPixelFormat.h \
            AE_EffectSuites.h \
            AE_EffectSuitesHelper.h \
            AE_EffectSuitesOld.h \
            AE_EffectUI.h \
            AE_EffectVers.h \
            AE_GeneralPlug.h \
            AE_GeneralPlugOld.h \
            AE_GeneralPlugPanels.h \
            AE_GeneralPlugPost.h \
            AE_GeneralPlugPre.h \
            AE_Hook.h \
            AE_IO.h \
            AE_IO_FileExt.h \
            AE_Macros.h \
            FIEL_Public.h \
            PF_Masks.h \
            PIFormatT.h \
            PR_Public.h \
            PT_Public.h \
            PrSDKAESupport.h \
            PrSDKPixelFormat.h \
            SuiteHelper.h
          do
            echo "Fetching Headers/$f"
            curl -fsSL "$BASE/Headers/$f" -o "SDK/Headers/$f"
          done

          # All SP/ headers
          for f in \
            SPAccess.h SPAdapts.h SPBasic.h SPBckDbg.h SPBlocks.h SPCOM.h \
            SPCaches.h SPConfig.h SPErrorCodes.h SPErrors.h SPFiles.h SPHost.h \
            SPInterf.h SPMData.h SPPiPL.h SPPlugs.h SPProps.h SPRuntme.h \
            SPSTSPrp.h SPStrngs.h SPSuites.h SPTypes.h
          do
            echo "Fetching Headers/SP/$f"
            curl -fsSL "$BASE/Headers/SP/$f" -o "SDK/Headers/SP/$f"
          done

          # adobesdk/config headers
          for f in PreConfig.h PostConfig.h AdobesdkTypes.h; do
            echo "Fetching Headers/adobesdk/config/$f"
            curl -fsSL "$BASE/Headers/adobesdk/config/$f" -o "SDK/Headers/adobesdk/config/$f"
          done

          # adobesdk/drawbotsuite headers
          mkdir -p SDK/Headers/adobesdk/drawbotsuite
          curl -fsSL "$BASE/Headers/adobesdk/DrawbotSuite.h" -o "SDK/Headers/adobesdk/DrawbotSuite.h"
          curl -fsSL "$BASE/Headers/adobesdk/drawbotsuite/DrawbotSuiteTypes.h" -o "SDK/Headers/adobesdk/drawbotsuite/DrawbotSuiteTypes.h"

          # Util/ headers
          for f in Param_Utils.h entry.h String_Utils.h; do
            echo "Fetching Util/$f"
            curl -fsSL "$BASE/Util/$f" -o "SDK/Util/$f"
          done

      # ── 4. Generate PiPL binary ───────────────────────────────────────────────
      - name: Generate PiPL resource binary
        shell: cmd
        run: python scripts\gen_pipl.py

      # ── 5. Build ──────────────────────────────────────────────────────────────
      - name: Build ColorOverlay.aex
        shell: cmd
        run: build.bat

      # ── 6. Verify the output exists ───────────────────────────────────────────
      - name: Verify artifact
        shell: bash
        run: |
          if [ -f "ColorOverlay.aex" ]; then
            SIZE=$(stat -c%s ColorOverlay.aex)
            echo "ColorOverlay.aex built successfully (${SIZE} bytes)"
          else
            echo "ERROR: ColorOverlay.aex not found"
            exit 1
          fi

      # ── 7. Upload as downloadable artifact ───────────────────────────────────
      - name: Upload ColorOverlay.aex
        uses: actions/upload-artifact@v4
        with:
          name: ColorOverlay-aex
          path: ColorOverlay.aex
          retention-days: 30
          if-no-files-found: error
